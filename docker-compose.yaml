services:
  catalogue:
    build: ./catalogue
    image: joindevops/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: joindevops/user:1.0.0
    container_name: user
    depends_on:
    - redis
  cart:
    build: ./cart
    image: joindevops/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
  shipping:
    build: ./shipping
    image: joindevops/shipping:1.0.0
    container_name: shipping
    depends_on:
    - mysql

  frontend:
    build: ./frontend
    image: joindevops/frontend:1.0.0
    container_name: frontend
    ports:
    - 8080
    depends_on:
    - catalogue
    - cart
    - user
    - shipping


  mongodb:
    build: ./mongodb
    image: joindevops/mongodb:1.0.0
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    build: ./mysql
    image: joindevops/mysql:1.0.0
    container_name: mysql
  
networks:
  default:
    driver: bridge
    name: roboshop
    external: false
